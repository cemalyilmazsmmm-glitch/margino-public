<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — Margino{% else %}Margino{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
{% if page.description %}
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
{% endif %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
</head>
<body>

<nav class="site">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}"><img src="{{ '/assets/logo.png' | relative_url }}" alt="Margino logo">Margino</a>
    <div class="navlinks">
      <a class="txt" href="{{ '/blog/' | relative_url }}">Blog</a>
      <a class="btn btn-primary" href="https://apps.apple.com/us/app/margino-smart-profit/id6767698556">Get the app</a>
    </div>
  </div>
</nav>

{{ content }}

<footer class="site">
  <div class="wrap">
    <div>© 2026 Margino · Cemal Yılmaz</div>
    <div class="links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="https://apps.apple.com/us/app/margino-smart-profit/id6767698556">App Store</a>
      <a href="{{ '/privacy-en.html' | relative_url }}">Privacy</a>
      <a href="{{ '/terms-en.html' | relative_url }}">Terms</a>
      <a href="{{ '/account-deletion.html' | relative_url }}">Data deletion</a>
      <a href="mailto:cemalyilmazsmmm@gmail.com">Contact</a>
    </div>
  </div>
</footer>

</body>
</html>
